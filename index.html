<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSJ Construtora</title>
    <meta
        name="description"
        content="DSJ Construtora - Obras, reformas e soluções em construção civil."
    >
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animation.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <header id="header"></header>

    <!-- Navigation Drawer -->

    <div
        class="navigation-drawer"
        id="navigation-drawer"
        aria-hidden="true">

        <!-- Overlay -->

        <div class="navigation-drawer-overlay"></div>

        <!-- Painel -->

        <aside
            class="navigation-drawer-panel"
            aria-label="Menu principal">

            <!-- Cabeçalho -->

            <div class="navigation-drawer-header">

                <a
                    href="#hero"
                    class="navigation-drawer-logo"
                    aria-label="Voltar ao início">

                    <img
                        src="assets/img/logo/logo-dsj.svg"
                        alt="Logo da DSJ Construtora">

                </a>

                <button
                    class="navigation-drawer-close"
                    type="button"
                    aria-label="Fechar menu">

                    ✕

                </button>

            </div>

            <!-- Navegação -->

            <nav class="navigation-drawer-nav">

                <ul>

                    <li><a href="#hero">Home</a></li>

                    <li><a href="#about">Quem Somos</a></li>

                    <li><a href="#mission">Missão, Visão e Valores</a></li>

                    <li><a href="#projects">Obras</a></li>

                    <li><a href="#contact">Contato</a></li>

                </ul>

            </nav>

            <!-- Redes sociais -->

            <div class="navigation-drawer-social">

                <!-- Ícones SVG serão adicionados depois -->

            </div>

            <!-- Botão principal -->

            <a
                href="#contact"
                class="button button-primary">

                Entrar em Contato

            </a>

            <!-- Texto institucional -->

            <p class="navigation-drawer-text">

                Construindo espaços com qualidade, confiança e compromisso em cada projeto.

            </p>

            <!-- Botão secundário -->

            <a
                href="#about"
                class="button button-secondary">

                Conheça a DSJ

            </a>

        </aside>

    </div>

    <div class="container">

        <!-- Logo -->
        <a href="#hero" class="header-logo" aria-label="Voltar ao início">
            <img
                src="assets/img/logo/logo-dsj.svg"
                alt="Logo da DSJ Construtora">
        </a>

        <!-- Botão do menu -->
        <button
            class="header-menu-button"
            type="button"
            aria-label="Abrir menu"
            aria-expanded="false"
            aria-controls="navigation-drawer">

            <span class="header-menu-icon">
                <span></span>
                <span></span>
                <span></span>
            </span>

        </button>

    </div>


    <main id="main"></main>

    <footer id="footer"></footer>



    <script type = "module" src = "js/main.js"></script>
</body>
</html>
